<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#001a3d">
  <meta name="format-detection" content="telephone=no">
  <title>須磨シーワールド ARカメラ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    :root {
      --ocean-deep: #001a3d;
      --ocean-mid: #0066cc;
      --ocean-bright: #00d4ff;
      --coral: #ff6b6b;
      --foam: #ffffff;
      --glass: rgba(255, 255, 255, 0.15);
      --glass-strong: rgba(255, 255, 255, 0.25);
      --glass-border: rgba(255, 255, 255, 0.3);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--ocean-deep);
      font-family: 'M PLUS Rounded 1c', system-ui, -apple-system, sans-serif;
      color: white;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* ============ Camera ============ */
    #camera-view {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: var(--ocean-deep);
      transition: transform 0.3s ease-out;
      transform-origin: center center;
    }

    /* ============ Sticker Layer ============ */
    #sticker-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    #sticker-layer.deselect-zone {
      pointer-events: auto;
    }

    .sticker {
      position: absolute;
      pointer-events: auto;
      touch-action: none;
      cursor: grab;
      will-change: transform;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sticker:active { cursor: grabbing; }

    .sticker.selected {
      outline: 2px dashed rgba(255,255,255,0.9);
      outline-offset: 6px;
      border-radius: 12px;
    }

    .emoji-inner {
      font-size: 80px;
      line-height: 1;
      display: inline-block;
      font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
    }

    .sticker-img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      display: block;
    }

    /* Animations */
    .anim-bob .emoji-inner, .anim-bob .sticker-img { animation: bob 2s ease-in-out infinite; }
    .anim-swim .emoji-inner, .anim-swim .sticker-img { animation: swim 3s ease-in-out infinite; }
    .anim-spin3d .emoji-inner, .anim-spin3d .sticker-img { animation: spin3d 4s linear infinite; }
    .anim-pulse .emoji-inner, .anim-pulse .sticker-img { animation: pulse 1.5s ease-in-out infinite; }
    .anim-wiggle .emoji-inner, .anim-wiggle .sticker-img { animation: wiggle 1.5s ease-in-out infinite; }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes swim {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      25% { transform: translateX(-6px) rotate(-4deg); }
      75% { transform: translateX(6px) rotate(4deg); }
    }
    @keyframes spin3d {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(-8deg); }
      50% { transform: rotate(8deg); }
    }

    /* Sticker bounce animation */
    .sticker-bounce {
      animation: stickerBounce 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards !important;
    }

    @keyframes stickerBounce {
      0%   { transform: translate(-50%, -50%) scale(0) rotate(0deg); }
      60%  { transform: translate(-50%, -50%) scale(1.5) rotate(5deg); }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    }

    /* ============ Top Bar ============ */
    .top-bar {
      position: absolute;
      top: env(safe-area-inset-top, 0);
      left: 0;
      right: 0;
      padding: 16px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      z-index: 50;
      pointer-events: none;
    }

    .top-bar > * { pointer-events: auto; }

    .top-bar-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .glass-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      flex-shrink: 0;
    }

    .glass-btn:active {
      transform: scale(0.92);
      background: var(--glass-strong);
    }

    /* ============ Sticker Palette ============ */
    /* 背景: 一番下までまんべんなく、最背面（撮影/ステッカーボタンの下） */
    .palette-bg {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 290px;
      background: rgba(0, 14, 35, 0.45);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,255,255,0.1);
      z-index: 25;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    .palette-bg.visible {
      transform: translateY(0);
      pointer-events: auto;
    }

    /* 横スクロール部分: 拡大パネルより上 */
    .palette-scroll {
      position: absolute;
      left: 0;
      right: 0;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 200px);
      height: 92px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      z-index: 36;
      pointer-events: none;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.3s, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      touch-action: pan-x;
    }

    .palette-scroll::-webkit-scrollbar { display: none; }

    .palette-scroll.visible {
      pointer-events: auto;
      opacity: 1;
      transform: translateY(0);
    }

    .palette-btn {
      flex: 0 0 auto;
      width: 76px;
      height: 76px;
      border-radius: 18px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .palette-btn:active {
      transform: scale(0.88);
      background: rgba(0, 212, 255, 0.3);
    }

    .palette-btn.recommended {
      background: rgba(255, 215, 0, 0.12);
      border-color: rgba(255, 215, 0, 0.4);
    }

    .palette-btn .emoji-inner {
      font-size: 40px;
    }

    .palette-btn .sticker-img {
      width: 58px;
      height: 58px;
      object-fit: contain;
    }

    /* 閉じるボタン: パレットの右上 */
    .palette-close {
      position: absolute;
      bottom: 240px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 36;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .palette-close.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* ステッカー表示トグルボタン: 右下 */
    .sticker-toggle-btn {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 42px);
      right: 16px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255,255,255,0.35);
      color: white;
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 35;
      pointer-events: auto;
      transition: transform 0.15s, background 0.2s;
    }

    .sticker-toggle-btn:active {
      transform: scale(0.9);
      background: rgba(0, 212, 255, 0.35);
    }

    /* パレット表示中は他の操作を無効化 */
    body.palette-open .top-bar,
    body.palette-open .top-bar *,
    body.palette-open .bottom-bar,
    body.palette-open .bottom-bar *,
    body.palette-open #sticker-layer,
    body.palette-open #sticker-layer .sticker {
      pointer-events: none !important;
    }

    /* ============ Bottom Bar ============ */
    .bottom-bar {
      position: absolute;
      bottom: env(safe-area-inset-bottom, 0);
      left: 0;
      right: 0;
      padding: 16px 16px 32px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 14px;
      pointer-events: none;
    }

    /* Zoom pills */
    .zoom-pills {
      display: flex;
      gap: 6px;
      padding: 4px;
      background: rgba(0, 14, 35, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.12);
      pointer-events: auto;
    }

    .zoom-pill {
      min-width: 40px;
      height: 36px;
      padding: 0 12px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.85);
      border-radius: 100px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.02em;
    }

    .zoom-pill.active {
      background: white;
      color: var(--ocean-deep);
      transform: scale(1.05);
      box-shadow: 0 2px 12px rgba(255,255,255,0.25);
    }

    .zoom-pill:active:not(.active) {
      transform: scale(0.92);
      background: rgba(255,255,255,0.1);
    }

    .capture-btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: transparent;
      border: 4px solid white;
      cursor: pointer;
      transition: transform 0.1s;
      position: relative;
      pointer-events: auto;
      padding: 0;
    }

    .capture-btn::before {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: white;
      transition: background 0.15s, transform 0.15s;
    }

    .capture-btn:active::before {
      background: var(--ocean-bright);
      transform: scale(0.85);
    }

    .capture-btn:active {
      transform: scale(0.95);
    }

    /* ============ Floating Controls ============ */
    #floating-controls {
      position: fixed;
      z-index: 500;
      pointer-events: none;
      display: none;
    }

    #floating-controls.visible {
      display: block;
      pointer-events: auto;
    }

    .float-btn {
      position: absolute;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0, 14, 35, 0.85);
      border: 1.5px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transform: translate(-50%, -50%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 0.1s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    .float-btn:active {
      transform: translate(-50%, -50%) scale(0.88);
      background: rgba(0, 102, 204, 0.7);
    }

    /* ============ Sparkle Particles ============ */
    .sparkle-particle {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      font-size: 20px;
      animation: sparkle-fly 0.6s ease-out forwards;
    }

    @keyframes sparkle-fly {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* ============ Welcome Screen ============ */
    .welcome {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #00204e 0%, #000a1f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 200;
      padding: 32px;
      text-align: center;
      overflow: hidden;
    }

    .welcome.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    .welcome-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.3em;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .welcome-logo {
      font-family: 'Pacifico', cursive;
      font-size: 52px;
      background: linear-gradient(135deg, #00d4ff 0%, #ffffff 50%, #ff9ec7 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: float 3s ease-in-out infinite;
      line-height: 1;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .welcome-emoji {
      font-size: 80px;
      margin: 16px 0;
      animation: swim-big 4s ease-in-out infinite;
      font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
    }

    @keyframes swim-big {
      0%, 100% { transform: translateX(0) rotate(-5deg); }
      50% { transform: translateX(20px) rotate(5deg); }
    }

    .welcome-desc {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      line-height: 1.9;
      max-width: 280px;
      font-weight: 400;
    }

    .start-btn {
      margin-top: 24px;
      background: linear-gradient(135deg, #00d4ff 0%, #0066cc 100%);
      color: white;
      border: none;
      padding: 18px 48px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.15em;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(0, 102, 204, 0.5), 0 0 0 1px rgba(255,255,255,0.1) inset;
      font-family: inherit;
      transition: transform 0.15s;
    }

    .start-btn:active { transform: scale(0.96); }

    /* Bubbles deco */
    .bubble {
      position: absolute;
      bottom: -30px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      animation: rise linear infinite;
      pointer-events: none;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% {
        transform: translateY(-110vh) translateX(40px);
        opacity: 0;
      }
    }

    /* ============ Loading ============ */
    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 250;
      background: var(--ocean-deep);
    }

    .loading.hidden { display: none; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: var(--ocean-bright);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.1em;
    }

    /* ============ Preview Screen ============ */
    .preview-screen {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 150;
      display: none;
      flex-direction: column;
    }

    .preview-screen.open { display: flex; }

    .preview-image {
      flex: 1;
      width: 100%;
      object-fit: contain;
      background: black;
      min-height: 0;
    }

    .preview-top {
      position: absolute;
      top: env(safe-area-inset-top, 0);
      left: 0;
      right: 0;
      padding: 16px;
      display: flex;
      justify-content: flex-end;
      z-index: 10;
    }

    .preview-controls {
      padding: 20px 16px env(safe-area-inset-bottom, 24px);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.6) 100%);
    }

    .action-btn {
      flex: 1;
      max-width: 130px;
      padding: 14px 8px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      border-radius: 16px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: transform 0.1s;
    }

    .action-btn:active { transform: scale(0.94); }

    .action-btn.primary {
      background: linear-gradient(135deg, #00d4ff, #0066cc);
      border: none;
    }

    .action-btn-icon {
      font-size: 22px;
      line-height: 1;
    }

    /* ============ Toast ============ */
    .toast {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 80px);
      left: 50%;
      transform: translateX(-50%) translateZ(0);
      background: rgba(0, 14, 35, 0.95);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 700;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      white-space: pre-line;
      max-width: 90vw;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* ============ Flash ============ */
    .flash {
      position: fixed;
      inset: 0;
      background: white;
      z-index: 90;
      opacity: 0;
      pointer-events: none;
    }

    .flash.show {
      animation: flashAnim 0.3s ease-out;
    }

    @keyframes flashAnim {
      0% { opacity: 0; }
      30% { opacity: 0.85; }
      100% { opacity: 0; }
    }

    /* ============ Hint ============ */
    .hint {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0) + 220px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 14, 35, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.05em;
      z-index: 25;
      border: 1px solid rgba(255,255,255,0.15);
      white-space: nowrap;
      animation: hintFade 5s ease-in-out forwards;
      pointer-events: none;
    }

    @keyframes hintFade {
      0% { opacity: 0; transform: translateX(-50%) translateY(8px); }
      15%, 70% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-4px); }
    }

    video::-webkit-media-controls { display: none !important; }
  </style>
</head>
<body>
  <div id="app">
    <!-- ============ Welcome ============ -->
    <div class="welcome" id="welcome">
      <div id="bubbles-container"></div>
      <div class="welcome-subtitle">SUMA SEAWORLD HOTEL</div>
      <div class="welcome-logo">AR Camera</div>
      <div class="welcome-emoji">🐬</div>
      <div class="welcome-desc">
        須磨シーワールドのなかまたちと<br>
        おもいでをのこそう！
      </div>
      <button class="start-btn" id="start-btn">はじめる</button>
    </div>

    <!-- ============ Loading ============ -->
    <div class="loading hidden" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">カメラを起動中...</div>
    </div>

    <!-- ============ Camera ============ -->
    <video id="camera-view" autoplay playsinline muted></video>
    <div id="sticker-layer"></div>

    <!-- ============ Top Bar ============ -->
    <div class="top-bar">
      <div class="top-bar-right">
        <button class="glass-btn" id="flip-btn" aria-label="カメラ切り替え">⟲</button>
        <button class="glass-btn" id="clear-btn" aria-label="全クリア">🗑️</button>
      </div>
    </div>

    <!-- ============ Sticker Palette ============ -->
    <div class="palette-bg" id="palette-bg"></div>
    <div class="palette-scroll" id="palette-scroll"></div>
    <button class="palette-close" id="palette-close" aria-label="閉じる">✕</button>
    <button class="sticker-toggle-btn" id="sticker-toggle-btn" aria-label="ステッカー">🐬</button>

    <!-- ============ Bottom Bar ============ -->
    <div class="bottom-bar">
      <div class="zoom-pills" id="zoom-pills">
        <button class="zoom-pill active" data-zoom="1">1x</button>
        <button class="zoom-pill" data-zoom="1.5">1.5x</button>
        <button class="zoom-pill" data-zoom="2">2x</button>
        <button class="zoom-pill" data-zoom="3">3x</button>
      </div>
      <button class="capture-btn" id="capture-btn" aria-label="撮影"></button>
    </div>

    <!-- ============ Floating Controls ============ -->
    <div id="floating-controls">
      <button class="float-btn" id="fb-plus">➕</button>
      <button class="float-btn" id="fb-minus">➖</button>
      <button class="float-btn" id="fb-rotate">🔄</button>
      <button class="float-btn" id="fb-delete">🗑️</button>
    </div>

    <!-- ============ Preview ============ -->
    <div class="preview-screen" id="preview-screen">
      <div class="preview-top">
        <button class="glass-btn" id="preview-close">✕</button>
      </div>
      <img class="preview-image" id="preview-image" alt="撮影画像">
      <div class="preview-controls">
        <button class="action-btn" id="retake-btn">
          <span class="action-btn-icon">↺</span>
          <span>とりなおす</span>
        </button>
        <button class="action-btn primary" id="share-btn">
          <span class="action-btn-icon">↗</span>
          <span>ほぞん・シェア</span>
        </button>
      </div>
    </div>

    <!-- ============ Flash ============ -->
    <div class="flash" id="flash"></div>
  </div>

  <!-- Toast はapp外に出してクリッピングを回避 -->
  <div class="toast" id="toast"></div>

  <script>
    'use strict';

    /* ============================================
       Sticker Definitions
       ============================================ */
    const STICKERS = [
      // ⭐ おすすめ
      { emoji: '🐬', anim: 'swim',  recommended: true },
      { emoji: '🌊', anim: 'pulse', recommended: true },
      { emoji: '⭐', anim: 'pulse', recommended: true },
      // PNG画像ステッカー
      { src: 'img/しゃち-sticker.png',          anim: 'swim' },
      { src: 'img/イルカ-sticker.png',           anim: 'swim' },
      { src: 'img/シャチ1-sticker.png',          anim: 'swim' },
      { src: 'img/シャチ2-sticker.png',          anim: 'swim' },
      { src: 'img/orca-sticker.png',             anim: 'swim' },
      { src: 'img/アザラシ-sticker.png',         anim: 'bob' },
      { src: 'img/アシカ-sticker.png',           anim: 'swim' },
      { src: 'img/ウミガメ-sticker.png',         anim: 'swim' },
      { src: 'img/マゼランペンギン-sticker.png', anim: 'wiggle' },
      // 絵文字ステッカー
      { emoji: '🐳', anim: 'swim' },
      { emoji: '🦈', anim: 'swim' },
      { emoji: '🐠', anim: 'swim' },
      { emoji: '🐟', anim: 'swim' },
      { emoji: '🐡', anim: 'swim' },
      { emoji: '🐢', anim: 'swim' },
      { emoji: '🦭', anim: 'swim' },
      { emoji: '🐋', anim: 'swim' },
      { emoji: '🪼', anim: 'bob' },
      { emoji: '🐙', anim: 'bob' },
      { emoji: '🫧', anim: 'bob' },
      { emoji: '🦑', anim: 'bob' },
      { emoji: '🐧', anim: 'wiggle' },
      { emoji: '🦀', anim: 'wiggle' },
      { emoji: '🐚', anim: 'wiggle' },
      { emoji: '🦐', anim: 'wiggle' },
      { emoji: '💙', anim: 'pulse' },
      { emoji: '🩵', anim: 'pulse' },
      { emoji: '🏖️', anim: 'pulse' },
      { emoji: '☀️', anim: 'pulse' },
      { emoji: '🌴', anim: 'pulse' },
    ];

    /* ============================================
       State
       ============================================ */
    let stream = null;
    let currentFacingMode = 'environment';
    let currentZoom = 1;
    let selectedSticker = null;
    let lastCapturedBlob = null;
    let zCounter = 100;
    const imageCache = new Map(); // src → HTMLImageElement (for canvas drawing)

    const $ = (id) => document.getElementById(id);

    /* ============================================
       Preload PNG sticker images
       ============================================ */
    function preloadImages() {
      const srcs = [...new Set(STICKERS.filter(i => i.src).map(i => i.src))];
      srcs.forEach(src => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => imageCache.set(src, img);
        img.onerror = () => console.warn('Sticker image failed to load:', src);
        img.src = src;
      });
    }
    preloadImages();

    /* ============================================
       Bubbles deco
       ============================================ */
    function createBubbles() {
      const container = $('bubbles-container');
      if (!container) return;
      container.style.position = 'absolute';
      container.style.inset = '0';
      container.style.pointerEvents = 'none';
      for (let i = 0; i < 12; i++) {
        const b = document.createElement('div');
        b.className = 'bubble';
        const size = 8 + Math.random() * 32;
        b.style.width = size + 'px';
        b.style.height = size + 'px';
        b.style.left = Math.random() * 100 + '%';
        b.style.animationDuration = (6 + Math.random() * 8) + 's';
        b.style.animationDelay = (Math.random() * 8) + 's';
        container.appendChild(b);
      }
    }
    createBubbles();

    /* ============================================
       Toast
       ============================================ */
    let toastTimer = null;
    function showToast(msg, ms = 1800) {
      const t = $('toast');
      t.innerHTML = msg.replace(/\n/g, '<br>');
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), ms);
    }

    /* ============================================
       Haptic feedback
       ============================================ */
    function haptic(ms = 8) {
      if (navigator.vibrate) {
        try { navigator.vibrate(ms); } catch (e) {}
      }
    }

    /* ============================================
       Audio (Web Audio API)
       ============================================ */
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playStickerSound() {
      if (muted) return;
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(659, ctx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.2);
      } catch(e) {}
    }

    /* ============================================
       Mute (音は常にON)
       ============================================ */
    let muted = false;

    /* ============================================
       Sparkle Particles
       ============================================ */
    function spawnParticles(x, y) {
      for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        p.className = 'sparkle-particle';
        p.textContent = '✨';
        const angle = (i / 8) * Math.PI * 2;
        const dist = 60 + Math.random() * 40;
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 700);
      }
    }

    /* ============================================
       Welcome / Start
       ============================================ */
    $('start-btn').addEventListener('click', async () => {
      haptic();
      $('welcome').classList.add('hidden');
      setTimeout(() => $('welcome').style.display = 'none', 400);
      $('loading').classList.remove('hidden');
      await startCamera();
      $('loading').classList.add('hidden');

      // Auto-place 2 recommended stickers
      const recommended = STICKERS.filter(s => s.recommended);
      const picks = recommended.sort(() => Math.random() - 0.5).slice(0, 2);
      const sw = window.innerWidth;
      const sh = window.innerHeight;
      const positions = [
        { x: sw * 0.25, y: sh * 0.25 },
        { x: sw * 0.75, y: sh * 0.65 },
      ];
      picks.forEach((item, i) => {
        addSticker(item, { autoPlace: true, x: positions[i].x, y: positions[i].y, scale: 0.85 });
      });

      showHint();
    });

    function showHint() {
      const hint = document.createElement('div');
      hint.className = 'hint';
      hint.textContent = '下のパレットからステッカーをえらべるよ！';
      document.getElementById('app').appendChild(hint);
      setTimeout(() => hint.remove(), 5000);
    }

    /* ============================================
       Camera
       ============================================ */
    function applyVideoTransform() {
      const video = $('camera-view');
      const sx = (currentFacingMode === 'user' ? -1 : 1) * currentZoom;
      const sy = currentZoom;
      video.style.transform = `scale(${sx}, ${sy})`;
    }

    async function startCamera() {
      try {
        if (stream) {
          stream.getTracks().forEach(t => t.stop());
          stream = null;
        }
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: currentFacingMode,
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });
        const video = $('camera-view');
        video.srcObject = stream;
        applyVideoTransform();
        await video.play();
      } catch (e) {
        console.error('Camera error:', e);
        showToast('カメラを起動できませんでした\nお使いのブラウザのカメラ設定がオンになっているか確認してください', 4000);
      }
    }

    $('flip-btn').addEventListener('click', async () => {
      haptic();
      currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
      await startCamera();
    });

    /* ============================================
       Clear button
       ============================================ */
    $('clear-btn').addEventListener('click', () => {
      haptic();
      $('sticker-layer').innerHTML = '';
      selectedSticker = null;
      hideFloatingControls();
      showToast('クリアしました');
    });

    /* ============================================
       Camera Zoom
       ============================================ */
    function setZoom(z) {
      currentZoom = z;
      applyVideoTransform();
      document.querySelectorAll('.zoom-pill').forEach(pill => {
        pill.classList.toggle('active', parseFloat(pill.dataset.zoom) === z);
      });
    }

    document.querySelectorAll('.zoom-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        const z = parseFloat(pill.dataset.zoom);
        haptic();
        setZoom(z);
      });
    });

    /* ============================================
       Sticker visual helpers
       ============================================ */
    function createStickerVisual(item) {
      if (item.src) {
        const img = document.createElement('img');
        img.src = item.src;
        img.className = 'sticker-img';
        img.draggable = false;
        img.alt = '';
        return img;
      } else {
        const span = document.createElement('span');
        span.className = 'emoji-inner';
        span.textContent = item.emoji;
        return span;
      }
    }

    function getAnimationStyle(anim) {
      const map = {
        bob: 'bob 2s ease-in-out infinite',
        swim: 'swim 3s ease-in-out infinite',
        spin3d: 'spin3d 4s linear infinite',
        pulse: 'pulse 1.5s ease-in-out infinite',
        wiggle: 'wiggle 1.5s ease-in-out infinite',
      };
      return map[anim] || '';
    }

    /* ============================================
       Build Sticker Palette
       ============================================ */
    function buildPalette() {
      const scroll = $('palette-scroll');
      STICKERS.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'palette-btn' + (item.recommended ? ' recommended' : '');
        const inner = createStickerVisual(item);
        if (item.anim) inner.style.animation = getAnimationStyle(item.anim);
        btn.appendChild(inner);
        btn.addEventListener('click', () => {
          haptic();
          addSticker(item);
        });
        scroll.appendChild(btn);
      });
    }
    buildPalette();

    /* ============================================
       Palette open/close
       ============================================ */
    let paletteOpen = false;
    function openPalette() {
      if (paletteOpen) return;
      paletteOpen = true;
      $('palette-bg').classList.add('visible');
      $('palette-scroll').classList.add('visible');
      $('palette-close').classList.add('visible');
      document.body.classList.add('palette-open');
      // 開く時は選択中のステッカーを解除
      if (selectedSticker) {
        selectedSticker.classList.remove('selected');
        selectedSticker = null;
      }
      hideFloatingControls();
      haptic();
    }
    function closePalette() {
      if (!paletteOpen) return;
      paletteOpen = false;
      $('palette-bg').classList.remove('visible');
      $('palette-scroll').classList.remove('visible');
      $('palette-close').classList.remove('visible');
      document.body.classList.remove('palette-open');
    }
    $('sticker-toggle-btn').addEventListener('click', () => {
      if (paletteOpen) closePalette();
      else openPalette();
    });
    $('palette-close').addEventListener('click', closePalette);

    /* ============================================
       Floating Controls
       ============================================ */
    let floatTarget = null;
    let deleteHoldTimer = null;

    function showFloatingControls(el) {
      floatTarget = el;
      $('floating-controls').classList.add('visible');
      positionFloatingControls(el);
    }

    function hideFloatingControls() {
      floatTarget = null;
      $('floating-controls').classList.remove('visible');
    }

    function positionFloatingControls(el) {
      if (!el || !el._state) return;
      const s = el._state;
      const R = 64;
      $('fb-plus').style.cssText   = `left:${s.x + R}px; top:${s.y}px;`;
      $('fb-minus').style.cssText  = `left:${s.x - R}px; top:${s.y}px;`;
      $('fb-rotate').style.cssText = `left:${s.x}px; top:${s.y + R}px;`;
      $('fb-delete').style.cssText = `left:${s.x + 50}px; top:${s.y - 50}px;`;
    }

    $('fb-plus').addEventListener('click', (e) => {
      e.stopPropagation();
      if (!floatTarget) return;
      haptic(6);
      floatTarget._state.scale = Math.min(5, floatTarget._state.scale * 1.25);
      updateStickerTransform(floatTarget);
    });

    $('fb-minus').addEventListener('click', (e) => {
      e.stopPropagation();
      if (!floatTarget) return;
      haptic(6);
      floatTarget._state.scale = Math.max(0.3, floatTarget._state.scale * 0.8);
      updateStickerTransform(floatTarget);
    });

    $('fb-rotate').addEventListener('click', (e) => {
      e.stopPropagation();
      if (!floatTarget) return;
      haptic(6);
      floatTarget._state.rotation += 15;
      updateStickerTransform(floatTarget);
    });

    // Long press (1s) to delete
    $('fb-delete').addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      deleteHoldTimer = setTimeout(() => {
        if (!floatTarget) return;
        haptic(20);
        const deleted = floatTarget;
        const deletedItem = {
          emoji: deleted._state.emoji,
          src: deleted._state.src,
          anim: deleted._state.anim
        };
        deleted.remove();
        hideFloatingControls();
        selectedSticker = null;
        showUndoToast(deletedItem);
      }, 1000);
    });
    $('fb-delete').addEventListener('pointerup', () => clearTimeout(deleteHoldTimer));
    $('fb-delete').addEventListener('pointercancel', () => clearTimeout(deleteHoldTimer));

    /* ============================================
       Undo Toast
       ============================================ */
    let lastDeletedItem = null;
    function showUndoToast(item) {
      lastDeletedItem = item;
      const t = $('toast');
      t.innerHTML = 'けした！ <button id="undo-btn" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:white;padding:4px 12px;border-radius:20px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;margin-left:8px;">もどす</button>';
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);

      $('undo-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        if (lastDeletedItem) addSticker(lastDeletedItem, { autoPlace: false });
        t.classList.remove('show');
      });
    }

    /* ============================================
       Sticker creation
       ============================================ */
    function addSticker(item, opts = {}) {
      const autoPlace = opts.autoPlace || false;
      const layer = $('sticker-layer');
      const el = document.createElement('div');
      el.className = 'sticker';
      if (item.anim) el.classList.add('anim-' + item.anim);

      const inner = createStickerVisual(item);
      el.appendChild(inner);

      const cx = opts.x !== undefined ? opts.x : window.innerWidth / 2;
      const cy = opts.y !== undefined ? opts.y : window.innerHeight / 2 + (Math.random() - 0.5) * 80;
      const initScale = opts.scale !== undefined ? opts.scale : 1;

      el._state = {
        x: cx,
        y: cy,
        scale: initScale,
        rotation: 0,
        emoji: item.emoji || null,
        src: item.src || null,
        anim: item.anim || null
      };
      el.style.zIndex = ++zCounter;
      updateStickerTransform(el);

      layer.appendChild(el);
      makeStickerInteractive(el);
      selectSticker(el);

      if (!autoPlace) {
        // Bounce animation
        el.style.animation = 'stickerBounce 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards';
        setTimeout(() => { el.style.animation = ''; }, 350);
        // Sound
        playStickerSound();
        // Particles
        spawnParticles(cx, cy);
        // Haptic
        haptic(12);
      }
    }

    function updateStickerTransform(el) {
      const s = el._state;
      el.style.left = s.x + 'px';
      el.style.top = s.y + 'px';
      el.style.transform = `translate(-50%, -50%) scale(${s.scale}) rotate(${s.rotation}deg)`;
      // Keep floating controls in sync
      if (floatTarget === el) positionFloatingControls(el);
    }

    function selectSticker(el) {
      if (selectedSticker && selectedSticker !== el) {
        selectedSticker.classList.remove('selected');
      }
      selectedSticker = el;
      if (el) {
        el.classList.add('selected');
        el.style.zIndex = ++zCounter;
        showFloatingControls(el);
      } else {
        hideFloatingControls();
      }
    }

    // Click outside to deselect
    $('camera-view').addEventListener('click', () => {
      if (selectedSticker) {
        selectedSticker.classList.remove('selected');
        selectedSticker = null;
        hideFloatingControls();
      }
    });

    /* ============================================
       Sticker interaction (touch + multitouch)
       ============================================ */
    function makeStickerInteractive(el) {
      let mode = null; // 'drag' | 'transform'
      let startState = null;
      let startTouches = null;
      let startCenter = null;
      let startDist = 0;
      let startAngle = 0;

      function onTouchStart(e) {
        e.preventDefault();
        e.stopPropagation();
        selectSticker(el);
        // Hide float controls during active touch
        $('floating-controls').classList.remove('visible');

        if (e.touches.length === 1) {
          mode = 'drag';
          startTouches = [{ x: e.touches[0].clientX, y: e.touches[0].clientY }];
          startState = { ...el._state };
        } else if (e.touches.length >= 2) {
          mode = 'transform';
          const t0 = e.touches[0];
          const t1 = e.touches[1];
          startTouches = [
            { x: t0.clientX, y: t0.clientY },
            { x: t1.clientX, y: t1.clientY }
          ];
          startCenter = {
            x: (t0.clientX + t1.clientX) / 2,
            y: (t0.clientY + t1.clientY) / 2
          };
          startDist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
          startAngle = Math.atan2(t1.clientY - t0.clientY, t1.clientX - t0.clientX);
          startState = { ...el._state };
        }
      }

      function onTouchMove(e) {
        if (!mode) return;
        e.preventDefault();
        e.stopPropagation();

        if (mode === 'drag' && e.touches.length >= 1) {
          const dx = e.touches[0].clientX - startTouches[0].x;
          const dy = e.touches[0].clientY - startTouches[0].y;
          el._state.x = startState.x + dx;
          el._state.y = startState.y + dy;
          updateStickerTransform(el);
        } else if (mode === 'transform' && e.touches.length >= 2) {
          const t0 = e.touches[0];
          const t1 = e.touches[1];
          const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
          const angle = Math.atan2(t1.clientY - t0.clientY, t1.clientX - t0.clientX);
          const center = {
            x: (t0.clientX + t1.clientX) / 2,
            y: (t0.clientY + t1.clientY) / 2
          };

          let newScale = startState.scale * (dist / startDist);
          newScale = Math.max(0.3, Math.min(5, newScale));
          el._state.scale = newScale;
          el._state.rotation = startState.rotation + (angle - startAngle) * 180 / Math.PI;
          el._state.x = startState.x + (center.x - startCenter.x);
          el._state.y = startState.y + (center.y - startCenter.y);
          updateStickerTransform(el);
        }
      }

      function onTouchEnd(e) {
        if (e.touches.length === 0) {
          mode = null;
          // Restore float controls if this sticker is still selected
          if (selectedSticker === el) {
            showFloatingControls(el);
          }
        } else if (e.touches.length === 1 && mode === 'transform') {
          // Switch to drag mode with remaining finger
          mode = 'drag';
          startTouches = [{ x: e.touches[0].clientX, y: e.touches[0].clientY }];
          startState = { ...el._state };
        }
      }

      // Touch
      el.addEventListener('touchstart', onTouchStart, { passive: false });
      el.addEventListener('touchmove', onTouchMove, { passive: false });
      el.addEventListener('touchend', onTouchEnd);
      el.addEventListener('touchcancel', onTouchEnd);

      // Mouse fallback for desktop testing
      let mouseDown = false;
      let mouseStart = null;
      let mouseStartState = null;
      el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        selectSticker(el);
        mouseDown = true;
        mouseStart = { x: e.clientX, y: e.clientY };
        mouseStartState = { ...el._state };
      });
      window.addEventListener('mousemove', (e) => {
        if (!mouseDown) return;
        e.preventDefault();
        const dx = e.clientX - mouseStart.x;
        const dy = e.clientY - mouseStart.y;
        el._state.x = mouseStartState.x + dx;
        el._state.y = mouseStartState.y + dy;
        updateStickerTransform(el);
      });
      window.addEventListener('mouseup', () => { mouseDown = false; });
    }

    /* ============================================
       Photo capture
       ============================================ */
    $('capture-btn').addEventListener('click', () => {
      haptic(20);
      // Deselect to remove dashed outline in capture
      const wasSelected = selectedSticker;
      if (wasSelected) wasSelected.classList.remove('selected');
      hideFloatingControls();

      // Flash effect
      const flash = $('flash');
      flash.classList.remove('show');
      void flash.offsetWidth; // restart animation
      flash.classList.add('show');

      setTimeout(() => {
        capture().then(blob => {
          if (!blob) {
            showToast('撮影にしっぱいしました');
            if (wasSelected) {
              wasSelected.classList.add('selected');
              showFloatingControls(wasSelected);
            }
            return;
          }
          lastCapturedBlob = blob;
          const url = URL.createObjectURL(blob);
          $('preview-image').src = url;
          $('preview-screen').classList.add('open');
          if (wasSelected) {
            wasSelected.classList.add('selected');
          }
        });
      }, 80);
    });

    async function capture() {
      const video = $('camera-view');
      if (!video.videoWidth) return null;

      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const sw = window.innerWidth;
      const sh = window.innerHeight;

      // Render at 2x for quality
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      const canvas = document.createElement('canvas');
      canvas.width = sw * dpr;
      canvas.height = sh * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      // Compute object-fit: cover source rect
      const videoRatio = vw / vh;
      const screenRatio = sw / sh;
      let sx, sy, sWidth, sHeight;
      if (videoRatio > screenRatio) {
        sHeight = vh;
        sWidth = vh * screenRatio;
        sx = (vw - sWidth) / 2;
        sy = 0;
      } else {
        sWidth = vw;
        sHeight = vw / screenRatio;
        sx = 0;
        sy = (vh - sHeight) / 2;
      }

      // Apply camera zoom by cropping further (centered)
      if (currentZoom > 1) {
        const zw = sWidth / currentZoom;
        const zh = sHeight / currentZoom;
        sx += (sWidth - zw) / 2;
        sy += (sHeight - zh) / 2;
        sWidth = zw;
        sHeight = zh;
      }

      // Draw video (mirrored if front camera)
      if (currentFacingMode === 'user') {
        ctx.save();
        ctx.translate(sw, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, sw, sh);
        ctx.restore();
      } else {
        ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, sw, sh);
      }

      // Draw stickers
      const stickers = document.querySelectorAll('.sticker');
      stickers.forEach(el => {
        const s = el._state;
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.rotate(s.rotation * Math.PI / 180);
        ctx.scale(s.scale, s.scale);
        // Drop shadow for parity with CSS
        ctx.shadowColor = 'rgba(0,0,0,0.4)';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetY = 4;

        if (s.src && imageCache.has(s.src)) {
          // PNG image sticker
          const img = imageCache.get(s.src);
          const size = 100; // matches .sticker-img CSS size
          ctx.drawImage(img, -size / 2, -size / 2, size, size);
        } else if (s.emoji) {
          // Emoji sticker
          ctx.font = '80px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(s.emoji, 0, 0);
        }
        ctx.restore();
      });

      return new Promise(resolve => {
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.92);
      });
    }

    /* ============================================
       Preview controls
       ============================================ */
    $('preview-close').addEventListener('click', () => {
      $('preview-screen').classList.remove('open');
    });

    $('retake-btn').addEventListener('click', () => {
      $('preview-screen').classList.remove('open');
    });

    function downloadPhoto() {
      const url = URL.createObjectURL(lastCapturedBlob);
      const a = document.createElement('a');
      a.href = url;
      const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
      a.download = `suma-seaworld-${ts}.jpg`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast('ほぞんしました！');
    }

    $('share-btn').addEventListener('click', async () => {
      if (!lastCapturedBlob) return;
      haptic();
      const file = new File([lastCapturedBlob], 'suma-seaworld.jpg', { type: 'image/jpeg' });
      try {
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            files: [file],
            title: '須磨シーワールド ARカメラ',
            text: '須磨シーワールドホテルでとった写真🐬'
          });
        } else {
          downloadPhoto();
        }
      } catch (e) {
        if (e.name !== 'AbortError') {
          console.error(e);
          showToast('シェアできませんでした');
        }
      }
    });

    /* ============================================
       Visibility / cleanup
       ============================================ */
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && stream) {
        // Pause video to save battery; will resume on visible
      }
    });

    // Prevent default gestures on the document
    document.addEventListener('gesturestart', (e) => e.preventDefault());
    document.addEventListener('gesturechange', (e) => e.preventDefault());

  </script>
</body>
</html>
