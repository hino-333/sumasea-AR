<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#001a3d">
  <meta name="format-detection" content="telephone=no">
  <title>須磨シーワールド ARカメラ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    :root {
      --ocean-deep: #001a3d;
      --ocean-mid: #0066cc;
      --ocean-bright: #00d4ff;
      --coral: #ff6b6b;
      --foam: #ffffff;
      --glass: rgba(255, 255, 255, 0.15);
      --glass-strong: rgba(255, 255, 255, 0.25);
      --glass-border: rgba(255, 255, 255, 0.3);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--ocean-deep);
      font-family: 'M PLUS Rounded 1c', system-ui, -apple-system, sans-serif;
      color: white;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* ============ Camera ============ */
    #camera-view {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: var(--ocean-deep);
      transition: transform 0.3s ease-out;
      transform-origin: center center;
    }

    /* ============ Sticker Layer ============ */
    #sticker-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    #sticker-layer.deselect-zone {
      pointer-events: auto;
    }

    .sticker {
      position: absolute;
      pointer-events: auto;
      touch-action: none;
      cursor: grab;
      will-change: transform;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sticker:active { cursor: grabbing; }

    .sticker.selected {
      outline: 2px dashed rgba(255,255,255,0.9);
      outline-offset: 6px;
      border-radius: 12px;
    }

    .emoji-inner {
      font-size: 80px;
      line-height: 1;
      display: inline-block;
      font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
    }

    .sticker-img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      display: block;
    }

    .sticker-option .sticker-img {
      width: 50px;
      height: 50px;
    }

    .delete-btn {
      position: absolute;
      top: -12px;
      right: -12px;
      width: 32px;
      height: 32px;
      background: var(--ocean-mid);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: 900;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      pointer-events: auto;
      border: 2px solid white;
      cursor: pointer;
    }

    .sticker.selected .delete-btn { display: flex; }

    /* Animations - apply to both emoji and image stickers */
    .anim-bob .emoji-inner, .anim-bob .sticker-img { animation: bob 2s ease-in-out infinite; }
    .anim-swim .emoji-inner, .anim-swim .sticker-img { animation: swim 3s ease-in-out infinite; }
    .anim-spin3d .emoji-inner, .anim-spin3d .sticker-img { animation: spin3d 4s linear infinite; }
    .anim-pulse .emoji-inner, .anim-pulse .sticker-img { animation: pulse 1.5s ease-in-out infinite; }
    .anim-wiggle .emoji-inner, .anim-wiggle .sticker-img { animation: wiggle 1.5s ease-in-out infinite; }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes swim {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      25% { transform: translateX(-6px) rotate(-4deg); }
      75% { transform: translateX(6px) rotate(4deg); }
    }
    @keyframes spin3d {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(-8deg); }
      50% { transform: rotate(8deg); }
    }

    /* ============ Top Bar ============ */
    .top-bar {
      position: absolute;
      top: env(safe-area-inset-top, 0);
      left: 0;
      right: 0;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 50;
      pointer-events: none;
    }

    .top-bar > * { pointer-events: auto; }

    .glass-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      flex-shrink: 0;
    }

    .glass-btn:active {
      transform: scale(0.92);
      background: var(--glass-strong);
    }

    .hamburger {
      flex-direction: column;
      gap: 5px;
    }

    .hamburger span {
      width: 18px;
      height: 2px;
      background: white;
      border-radius: 2px;
    }

    /* ============ Drawer ============ */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 10, 30, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
    }

    .drawer-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 80%;
      max-width: 320px;
      background: linear-gradient(180deg, #003875 0%, #001a3d 60%, #000914 100%);
      transform: translateX(-100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 101;
      padding: env(safe-area-inset-top, 24px) 0 env(safe-area-inset-bottom, 24px);
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 32px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .drawer::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.3) 0%, transparent 70%);
      pointer-events: none;
    }

    .drawer.open { transform: translateX(0); }

    .drawer-header {
      padding: 32px 24px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }

    .drawer-title {
      font-family: 'Pacifico', cursive;
      font-size: 32px;
      background: linear-gradient(135deg, #00d4ff, #ffffff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 0.5px;
      line-height: 1.1;
    }

    .drawer-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 6px;
      letter-spacing: 0.2em;
      font-weight: 700;
    }

    .drawer-menu {
      flex: 1;
      padding: 16px 12px;
      overflow-y: auto;
      position: relative;
    }

    .menu-section-label {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.15em;
      padding: 16px 16px 8px;
      text-transform: uppercase;
      font-weight: 900;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }

    .menu-item:active {
      background: rgba(255,255,255,0.08);
    }

    .menu-item-icon {
      width: 38px;
      height: 38px;
      background: rgba(0, 212, 255, 0.15);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .menu-item-badge {
      margin-left: auto;
      font-size: 9px;
      background: var(--coral);
      padding: 3px 8px;
      border-radius: 8px;
      letter-spacing: 0.1em;
      font-weight: 900;
    }

    .drawer-footer {
      padding: 16px 24px;
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      text-align: center;
      letter-spacing: 0.1em;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    /* ============ Bottom Bar ============ */
    .bottom-bar {
      position: absolute;
      bottom: env(safe-area-inset-bottom, 0);
      left: 0;
      right: 0;
      padding: 16px 16px 32px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 14px;
      pointer-events: none;
    }

    /* Zoom pills */
    .zoom-pills {
      display: flex;
      gap: 6px;
      padding: 4px;
      background: rgba(0, 14, 35, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.12);
      pointer-events: auto;
    }

    .zoom-pill {
      min-width: 40px;
      height: 36px;
      padding: 0 12px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.85);
      border-radius: 100px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.02em;
    }

    .zoom-pill.active {
      background: white;
      color: var(--ocean-deep);
      transform: scale(1.05);
      box-shadow: 0 2px 12px rgba(255,255,255,0.25);
    }

    .zoom-pill:active:not(.active) {
      transform: scale(0.92);
      background: rgba(255,255,255,0.1);
    }

    .capture-btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: transparent;
      border: 4px solid white;
      cursor: pointer;
      transition: transform 0.1s;
      position: relative;
      pointer-events: auto;
      padding: 0;
    }

    .capture-btn::before {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: white;
      transition: background 0.15s, transform 0.15s;
    }

    .capture-btn:active::before {
      background: var(--ocean-bright);
      transform: scale(0.85);
    }

    .capture-btn:active {
      transform: scale(0.95);
    }

    /* ============ Sticker Tray ============ */
    .sticker-tray {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 14, 35, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--glass-border);
      transform: translateY(110%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 40;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .sticker-tray.open { transform: translateY(0); }

    .tray-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      margin: 8px auto 0;
    }

    .tray-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px 8px;
    }

    .tray-title {
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.05em;
    }

    .tray-title small {
      display: block;
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    .tray-close {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sticker-grid {
      display: flex;
      gap: 10px;
      padding: 8px 16px 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .sticker-grid::-webkit-scrollbar { display: none; }

    .sticker-option {
      flex: 0 0 auto;
      width: 64px;
      height: 64px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      padding: 0;
    }

    .sticker-option:active {
      transform: scale(0.88);
      background: rgba(0, 212, 255, 0.2);
    }

    .sticker-option .emoji-inner {
      font-size: 36px;
    }

    /* ============ Welcome Screen ============ */
    .welcome {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #00204e 0%, #000a1f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 200;
      padding: 32px;
      text-align: center;
      overflow: hidden;
    }

    .welcome.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    .welcome-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.3em;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .welcome-logo {
      font-family: 'Pacifico', cursive;
      font-size: 52px;
      background: linear-gradient(135deg, #00d4ff 0%, #ffffff 50%, #ff9ec7 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: float 3s ease-in-out infinite;
      line-height: 1;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .welcome-emoji {
      font-size: 80px;
      margin: 16px 0;
      animation: swim-big 4s ease-in-out infinite;
      font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
    }

    @keyframes swim-big {
      0%, 100% { transform: translateX(0) rotate(-5deg); }
      50% { transform: translateX(20px) rotate(5deg); }
    }

    .welcome-desc {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      line-height: 1.9;
      max-width: 280px;
      font-weight: 400;
    }

    .start-btn {
      margin-top: 24px;
      background: linear-gradient(135deg, #00d4ff 0%, #0066cc 100%);
      color: white;
      border: none;
      padding: 18px 48px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.15em;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(0, 102, 204, 0.5), 0 0 0 1px rgba(255,255,255,0.1) inset;
      font-family: inherit;
      transition: transform 0.15s;
    }

    .start-btn:active { transform: scale(0.96); }

    /* Bubbles deco */
    .bubble {
      position: absolute;
      bottom: -30px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      animation: rise linear infinite;
      pointer-events: none;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% {
        transform: translateY(-110vh) translateX(40px);
        opacity: 0;
      }
    }

    /* ============ Loading ============ */
    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 250;
      background: var(--ocean-deep);
    }

    .loading.hidden { display: none; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: var(--ocean-bright);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.1em;
    }

    /* ============ Preview Screen ============ */
    .preview-screen {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 150;
      display: none;
      flex-direction: column;
    }

    .preview-screen.open { display: flex; }

    .preview-image {
      flex: 1;
      width: 100%;
      object-fit: contain;
      background: black;
      min-height: 0;
    }

    .preview-top {
      position: absolute;
      top: env(safe-area-inset-top, 0);
      left: 0;
      right: 0;
      padding: 16px;
      display: flex;
      justify-content: flex-end;
      z-index: 10;
    }

    .preview-controls {
      padding: 20px 16px env(safe-area-inset-bottom, 24px);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.6) 100%);
    }

    .action-btn {
      flex: 1;
      max-width: 130px;
      padding: 14px 8px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      border-radius: 16px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: transform 0.1s;
    }

    .action-btn:active { transform: scale(0.94); }

    .action-btn.primary {
      background: linear-gradient(135deg, #00d4ff, #0066cc);
      border: none;
    }

    .action-btn-icon {
      font-size: 22px;
      line-height: 1;
    }

    /* ============ Toast ============ */
    .toast {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 80px);
      left: 50%;
      transform: translateX(-50%) translateZ(0);
      background: rgba(0, 14, 35, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 700;
      z-index: 300;
      opacity: 0;
      will-change: opacity;
      transition: opacity 0.4s ease;
      pointer-events: none;
      white-space: pre-line;
      max-width: 90vw;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
    }

    /* ============ Flash ============ */
    .flash {
      position: fixed;
      inset: 0;
      background: white;
      z-index: 90;
      opacity: 0;
      pointer-events: none;
    }

    .flash.show {
      animation: flashAnim 0.3s ease-out;
    }

    @keyframes flashAnim {
      0% { opacity: 0; }
      30% { opacity: 0.85; }
      100% { opacity: 0; }
    }

    /* ============ Hint ============ */
    .hint {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0) + 200px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 14, 35, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.05em;
      z-index: 25;
      border: 1px solid rgba(255,255,255,0.15);
      white-space: nowrap;
      animation: hintFade 5s ease-in-out forwards;
      pointer-events: none;
    }

    @keyframes hintFade {
      0% { opacity: 0; transform: translateX(-50%) translateY(8px); }
      15%, 70% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-4px); }
    }

    video::-webkit-media-controls { display: none !important; }
  </style>
</head>
<body>
  <div id="app">
    <!-- ============ Welcome ============ -->
    <div class="welcome" id="welcome">
      <div id="bubbles-container"></div>
      <div class="welcome-subtitle">SUMA SEAWORLD HOTEL</div>
      <div class="welcome-logo">AR Camera</div>
      <div class="welcome-emoji">🐬</div>
      <div class="welcome-desc">
        須磨シーワールドのなかまたちと<br>
        おもいでをのこそう！
      </div>
      <button class="start-btn" id="start-btn">はじめる</button>
    </div>

    <!-- ============ Loading ============ -->
    <div class="loading hidden" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">カメラを起動中...</div>
    </div>

    <!-- ============ Camera ============ -->
    <video id="camera-view" autoplay playsinline muted></video>
    <div id="sticker-layer"></div>

    <!-- ============ Top Bar ============ -->
    <div class="top-bar">
      <button class="glass-btn hamburger" id="menu-btn" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
      <button class="glass-btn" id="flip-btn" aria-label="カメラ切り替え">⟲</button>
    </div>

    <!-- ============ Bottom Bar ============ -->
    <div class="bottom-bar">
      <div class="zoom-pills" id="zoom-pills">
        <button class="zoom-pill active" data-zoom="1">1x</button>
        <button class="zoom-pill" data-zoom="1.5">1.5x</button>
        <button class="zoom-pill" data-zoom="2">2x</button>
        <button class="zoom-pill" data-zoom="3">3x</button>
      </div>
      <button class="capture-btn" id="capture-btn" aria-label="撮影"></button>
    </div>

    <!-- ============ Drawer ============ -->
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <aside class="drawer" id="drawer">
      <div class="drawer-header">
        <div class="drawer-title">Suma SeaWorld</div>
        <div class="drawer-subtitle">AR PHOTO BOOTH</div>
      </div>
      <nav class="drawer-menu">
        <div class="menu-section-label">ステッカーをえらぶ</div>
        <div class="menu-item" data-category="static">
          <div class="menu-item-icon">🐠</div>
          <div>ステッカー</div>
        </div>
        <div class="menu-item" data-category="animated">
          <div class="menu-item-icon">🐬</div>
          <div>うごくステッカー</div>
        </div>

        <div class="menu-section-label">そのた</div>
        <div class="menu-item" id="clear-all">
          <div class="menu-item-icon">🗑️</div>
          <div>ぜんぶクリア</div>
        </div>
      </nav>
      <div class="drawer-footer">
        © Suma Seaworld Hotel
      </div>
    </aside>

    <!-- ============ Sticker Tray ============ -->
    <div class="sticker-tray" id="sticker-tray">
      <div class="tray-handle"></div>
      <div class="tray-header">
        <div class="tray-title">
          <span id="tray-title-text">ステッカー</span>
          <small id="tray-title-sub">タップでついか・ドラッグでいどう</small>
        </div>
        <button class="tray-close" id="tray-close">✕</button>
      </div>
      <div class="sticker-grid" id="sticker-grid"></div>
    </div>

    <!-- ============ Preview ============ -->
    <div class="preview-screen" id="preview-screen">
      <div class="preview-top">
        <button class="glass-btn" id="preview-close">✕</button>
      </div>
      <img class="preview-image" id="preview-image" alt="撮影画像">
      <div class="preview-controls">
        <button class="action-btn" id="retake-btn">
          <span class="action-btn-icon">↺</span>
          <span>とりなおす</span>
        </button>
        <button class="action-btn primary" id="share-btn">
          <span class="action-btn-icon">↗</span>
          <span>ほぞん・シェア</span>
        </button>
      </div>
    </div>

    <!-- ============ Flash & Toast ============ -->
    <div class="flash" id="flash"></div>
    <div class="toast" id="toast"></div>
  </div>

  <script>
    'use strict';

    /* ============================================
       Sticker Definitions
       ============================================ */
    /* ============================================
       Sticker Definitions

       各ステッカーは以下のどちらかの形式で指定:
         { emoji: '🐬' }           ← 絵文字
         { src: 'stickers/orca.png' }  ← PNG画像 (推奨サイズ: 256x256以上)

       両方とも anim プロパティでアニメ追加可能:
         { src: 'stickers/dolphin.png', anim: 'swim' }
         アニメ種類: 'swim' | 'bob' | 'spin3d' | 'pulse' | 'wiggle'

       PNGを使う場合: index.html と同じ階層に stickers/ フォルダを作って
       PNG画像を入れて、下記の src パスを書き換えてください。
       ============================================ */
    const STICKER_SETS = {
      static: {
        title: 'ステッカー',
        sub: 'うみのなかまたち',
        items: [
          // ▼ PNG画像に置き換える例 (stickers/ フォルダにファイルを置いてコメントを外す)
          // { src: 'stickers/orca.png' },
          // { src: 'stickers/dolphin.png' },
          // { src: 'stickers/penguin.png' },

          // ▼ 現在は絵文字 (PNG用意できたら上の例のように置き換え)
          { src: 'img/orca-sticker.png' }, { emoji: '🐬' }, { emoji: '🐳' }, { emoji: '🐋' }, { emoji: '🦈' },
          { emoji: '🐠' }, { emoji: '🐟' }, { emoji: '🐡' }, { emoji: '🪼' },
          { emoji: '🐙' }, { emoji: '🦑' }, { emoji: '🦐' }, { emoji: '🦞' },
          { emoji: '🦀' }, { emoji: '🐚' }, { emoji: '🐢' }, { emoji: '🦭' },
          { emoji: '🐧' }, { emoji: '⭐' }, { emoji: '💙' }, { emoji: '🩵' },
          { emoji: '🌊' }, { emoji: '🫧' }, { emoji: '🏖️' }, { emoji: '☀️' },
          { emoji: '🌴' }, { emoji: '🥽' },
        ]
      },
      animated: {
        title: 'うごくステッカー',
        sub: 'タップでついか・うごくよ！',
        items: [
          // ▼ PNG画像にアニメ付きの例:
          // { src: 'stickers/orca.png', anim: 'swim' },
          // { src: 'stickers/dolphin.png', anim: 'swim' },

          { emoji: '🐬', anim: 'swim' },
          { emoji: '🐠', anim: 'swim' },
          { emoji: '🐟', anim: 'swim' },
          { emoji: '🦈', anim: 'swim' },
          { emoji: '🐳', anim: 'swim' },
          { emoji: '🐢', anim: 'swim' },
          { emoji: '🐡', anim: 'swim' },
          { emoji: '🐙', anim: 'bob' },
          { emoji: '🪼', anim: 'bob' },
          { emoji: '🫧', anim: 'bob' },
          { emoji: '🦭', anim: 'bob' },
          { emoji: '🐧', anim: 'wiggle' },
          { emoji: '🦀', anim: 'wiggle' },
          { emoji: '⭐', anim: 'pulse' },
          { emoji: '💙', anim: 'pulse' },
          { emoji: '🩵', anim: 'pulse' },
        ]
      },
      '3d': {
        title: '3Dステッカー',
        sub: 'くるくるかいてん！',
        items: [
          // ▼ PNG画像でも回転OK:
          // { src: 'stickers/orca.png', anim: 'spin3d' },

          { emoji: '🐬', anim: 'spin3d' },
          { emoji: '🐳', anim: 'spin3d' },
          { emoji: '🐠', anim: 'spin3d' },
          { emoji: '🦈', anim: 'spin3d' },
          { emoji: '🐢', anim: 'spin3d' },
          { emoji: '🐙', anim: 'spin3d' },
          { emoji: '⭐', anim: 'spin3d' },
          { emoji: '💎', anim: 'spin3d' },
          { emoji: '🩵', anim: 'spin3d' },
          { emoji: '🌊', anim: 'spin3d' },
          { emoji: '🐚', anim: 'spin3d' },
          { emoji: '🦑', anim: 'spin3d' },
        ]
      }
    };

    /* ============================================
       State
       ============================================ */
    let stream = null;
    let currentFacingMode = 'environment';
    let currentZoom = 1;
    let selectedSticker = null;
    let lastCapturedBlob = null;
    let zCounter = 100;
    const imageCache = new Map(); // src → HTMLImageElement (for canvas drawing)

    const $ = (id) => document.getElementById(id);

    /* ============================================
       Preload PNG sticker images
       ============================================ */
    function preloadImages() {
      const allItems = Object.values(STICKER_SETS).flatMap(s => s.items);
      const srcs = [...new Set(allItems.filter(i => i.src).map(i => i.src))];
      srcs.forEach(src => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => imageCache.set(src, img);
        img.onerror = () => console.warn('Sticker image failed to load:', src);
        img.src = src;
      });
    }
    preloadImages();

    /* ============================================
       Bubbles deco
       ============================================ */
    function createBubbles() {
      const container = $('bubbles-container');
      if (!container) return;
      container.style.position = 'absolute';
      container.style.inset = '0';
      container.style.pointerEvents = 'none';
      for (let i = 0; i < 12; i++) {
        const b = document.createElement('div');
        b.className = 'bubble';
        const size = 8 + Math.random() * 32;
        b.style.width = size + 'px';
        b.style.height = size + 'px';
        b.style.left = Math.random() * 100 + '%';
        b.style.animationDuration = (6 + Math.random() * 8) + 's';
        b.style.animationDelay = (Math.random() * 8) + 's';
        container.appendChild(b);
      }
    }
    createBubbles();

    /* ============================================
       Toast
       ============================================ */
    let toastTimer = null;
    function showToast(msg, ms = 1800) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), ms);
    }

    /* ============================================
       Haptic feedback
       ============================================ */
    function haptic(ms = 8) {
      if (navigator.vibrate) {
        try { navigator.vibrate(ms); } catch (e) {}
      }
    }

    /* ============================================
       Welcome / Start
       ============================================ */
    $('start-btn').addEventListener('click', async () => {
      haptic();
      $('welcome').classList.add('hidden');
      setTimeout(() => $('welcome').style.display = 'none', 400);
      $('loading').classList.remove('hidden');
      await startCamera();
      $('loading').classList.add('hidden');
      showHint();
    });

    function showHint() {
      const hint = document.createElement('div');
      hint.className = 'hint';
      hint.textContent = '☰ メニューからステッカーをえらべるよ！';
      document.getElementById('app').appendChild(hint);
      setTimeout(() => hint.remove(), 5000);
    }

    /* ============================================
       Camera
       ============================================ */
    function applyVideoTransform() {
      const video = $('camera-view');
      const sx = (currentFacingMode === 'user' ? -1 : 1) * currentZoom;
      const sy = currentZoom;
      video.style.transform = `scale(${sx}, ${sy})`;
    }

    async function startCamera() {
      try {
        if (stream) {
          stream.getTracks().forEach(t => t.stop());
          stream = null;
        }
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: currentFacingMode,
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });
        const video = $('camera-view');
        video.srcObject = stream;
        applyVideoTransform();
        await video.play();
      } catch (e) {
        console.error('Camera error:', e);
        showToast('カメラを起動できませんでした\nお使いのブラウザのカメラ設定がオンになっているか確認してください', 4000);
      }
    }

    $('flip-btn').addEventListener('click', async () => {
      haptic();
      currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
      await startCamera();
    });

    /* ============================================
       Camera Zoom
       ============================================ */
    function setZoom(z) {
      currentZoom = z;
      applyVideoTransform();
      document.querySelectorAll('.zoom-pill').forEach(pill => {
        pill.classList.toggle('active', parseFloat(pill.dataset.zoom) === z);
      });
    }

    document.querySelectorAll('.zoom-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        const z = parseFloat(pill.dataset.zoom);
        haptic();
        setZoom(z);
      });
    });

    /* ============================================
       Drawer
       ============================================ */
    const drawer = $('drawer');
    const drawerOverlay = $('drawer-overlay');

    function openDrawer() {
      drawer.classList.add('open');
      drawerOverlay.classList.add('open');
      haptic();
    }
    function closeDrawer() {
      drawer.classList.remove('open');
      drawerOverlay.classList.remove('open');
    }

    $('menu-btn').addEventListener('click', openDrawer);
    drawerOverlay.addEventListener('click', closeDrawer);

    document.querySelectorAll('.menu-item[data-category]').forEach(item => {
      item.addEventListener('click', () => {
        const cat = item.dataset.category;
        haptic();
        closeDrawer();
        setTimeout(() => openTray(cat), 200);
      });
    });

    $('clear-all').addEventListener('click', () => {
      haptic();
      $('sticker-layer').innerHTML = '';
      selectedSticker = null;
      closeDrawer();
      showToast('クリアしました');
    });

    /* ============================================
       Sticker Tray
       ============================================ */
    const tray = $('sticker-tray');
    const trayGrid = $('sticker-grid');

    function createStickerVisual(item) {
      // Returns the inner element (img or span) for a sticker item
      if (item.src) {
        const img = document.createElement('img');
        img.src = item.src;
        img.className = 'sticker-img';
        img.draggable = false;
        img.alt = '';
        return img;
      } else {
        const span = document.createElement('span');
        span.className = 'emoji-inner';
        span.textContent = item.emoji;
        return span;
      }
    }

    function openTray(category) {
      const set = STICKER_SETS[category];
      if (!set) return;
      $('tray-title-text').textContent = set.title;
      $('tray-title-sub').textContent = set.sub;
      trayGrid.innerHTML = '';
      set.items.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'sticker-option';
        const inner = createStickerVisual(item);
        if (item.anim) {
          inner.style.animation = getAnimationStyle(item.anim);
        }
        btn.appendChild(inner);
        btn.addEventListener('click', () => {
          haptic();
          addSticker(item);
        });
        trayGrid.appendChild(btn);
      });
      tray.classList.add('open');
    }

    function getAnimationStyle(anim) {
      const map = {
        bob: 'bob 2s ease-in-out infinite',
        swim: 'swim 3s ease-in-out infinite',
        spin3d: 'spin3d 4s linear infinite',
        pulse: 'pulse 1.5s ease-in-out infinite',
        wiggle: 'wiggle 1.5s ease-in-out infinite',
      };
      return map[anim] || '';
    }

    $('tray-close').addEventListener('click', () => {
      tray.classList.remove('open');
    });

    /* ============================================
       Sticker creation
       ============================================ */
    function addSticker(item) {
      const layer = $('sticker-layer');
      const el = document.createElement('div');
      el.className = 'sticker';
      if (item.anim) el.classList.add('anim-' + item.anim);

      const inner = createStickerVisual(item);
      el.appendChild(inner);

      const del = document.createElement('div');
      del.className = 'delete-btn';
      del.textContent = '✕';
      del.addEventListener('pointerdown', (e) => e.stopPropagation());
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        haptic();
        el.remove();
        if (selectedSticker === el) selectedSticker = null;
      });
      el.appendChild(del);

      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2 + (Math.random() - 0.5) * 80;
      el._state = {
        x: cx,
        y: cy,
        scale: 1,
        rotation: 0,
        emoji: item.emoji || null,
        src: item.src || null,
        anim: item.anim || null
      };
      el.style.zIndex = ++zCounter;
      updateStickerTransform(el);

      layer.appendChild(el);
      makeStickerInteractive(el);
      selectSticker(el);
    }

    function updateStickerTransform(el) {
      const s = el._state;
      el.style.left = s.x + 'px';
      el.style.top = s.y + 'px';
      el.style.transform = `translate(-50%, -50%) scale(${s.scale}) rotate(${s.rotation}deg)`;
    }

    function selectSticker(el) {
      if (selectedSticker && selectedSticker !== el) {
        selectedSticker.classList.remove('selected');
      }
      selectedSticker = el;
      if (el) {
        el.classList.add('selected');
        // Bring to top using z-index (safe during touch)
        el.style.zIndex = ++zCounter;
      }
    }

    // Click outside to deselect
    $('camera-view').addEventListener('click', () => {
      if (selectedSticker) {
        selectedSticker.classList.remove('selected');
        selectedSticker = null;
      }
    });

    /* ============================================
       Sticker interaction (touch + multitouch)
       ============================================ */
    function makeStickerInteractive(el) {
      let mode = null; // 'drag' | 'transform'
      let startState = null;
      let startTouches = null;
      let startCenter = null;
      let startDist = 0;
      let startAngle = 0;

      function onTouchStart(e) {
        // Don't start if tapping delete button
        if (e.target.classList.contains('delete-btn')) return;
        e.preventDefault();
        e.stopPropagation();
        selectSticker(el);

        if (e.touches.length === 1) {
          mode = 'drag';
          startTouches = [{ x: e.touches[0].clientX, y: e.touches[0].clientY }];
          startState = { ...el._state };
        } else if (e.touches.length >= 2) {
          mode = 'transform';
          const t0 = e.touches[0];
          const t1 = e.touches[1];
          startTouches = [
            { x: t0.clientX, y: t0.clientY },
            { x: t1.clientX, y: t1.clientY }
          ];
          startCenter = {
            x: (t0.clientX + t1.clientX) / 2,
            y: (t0.clientY + t1.clientY) / 2
          };
          startDist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
          startAngle = Math.atan2(t1.clientY - t0.clientY, t1.clientX - t0.clientX);
          startState = { ...el._state };
        }
      }

      function onTouchMove(e) {
        if (!mode) return;
        e.preventDefault();
        e.stopPropagation();

        if (mode === 'drag' && e.touches.length >= 1) {
          const dx = e.touches[0].clientX - startTouches[0].x;
          const dy = e.touches[0].clientY - startTouches[0].y;
          el._state.x = startState.x + dx;
          el._state.y = startState.y + dy;
          updateStickerTransform(el);
        } else if (mode === 'transform' && e.touches.length >= 2) {
          const t0 = e.touches[0];
          const t1 = e.touches[1];
          const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
          const angle = Math.atan2(t1.clientY - t0.clientY, t1.clientX - t0.clientX);
          const center = {
            x: (t0.clientX + t1.clientX) / 2,
            y: (t0.clientY + t1.clientY) / 2
          };

          let newScale = startState.scale * (dist / startDist);
          newScale = Math.max(0.3, Math.min(5, newScale));
          el._state.scale = newScale;
          el._state.rotation = startState.rotation + (angle - startAngle) * 180 / Math.PI;
          el._state.x = startState.x + (center.x - startCenter.x);
          el._state.y = startState.y + (center.y - startCenter.y);
          updateStickerTransform(el);
        }
      }

      function onTouchEnd(e) {
        if (e.touches.length === 0) {
          mode = null;
        } else if (e.touches.length === 1 && mode === 'transform') {
          // Switch to drag mode with remaining finger
          mode = 'drag';
          startTouches = [{ x: e.touches[0].clientX, y: e.touches[0].clientY }];
          startState = { ...el._state };
        }
      }

      // Touch
      el.addEventListener('touchstart', onTouchStart, { passive: false });
      el.addEventListener('touchmove', onTouchMove, { passive: false });
      el.addEventListener('touchend', onTouchEnd);
      el.addEventListener('touchcancel', onTouchEnd);

      // Mouse fallback for desktop testing
      let mouseDown = false;
      let mouseStart = null;
      let mouseStartState = null;
      el.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('delete-btn')) return;
        e.preventDefault();
        e.stopPropagation();
        selectSticker(el);
        mouseDown = true;
        mouseStart = { x: e.clientX, y: e.clientY };
        mouseStartState = { ...el._state };
      });
      window.addEventListener('mousemove', (e) => {
        if (!mouseDown) return;
        e.preventDefault();
        const dx = e.clientX - mouseStart.x;
        const dy = e.clientY - mouseStart.y;
        el._state.x = mouseStartState.x + dx;
        el._state.y = mouseStartState.y + dy;
        updateStickerTransform(el);
      });
      window.addEventListener('mouseup', () => { mouseDown = false; });
    }

    /* ============================================
       Photo capture
       ============================================ */
    $('capture-btn').addEventListener('click', () => {
      haptic(20);
      // Deselect to remove dashed outline in capture
      const wasSelected = selectedSticker;
      if (wasSelected) wasSelected.classList.remove('selected');

      // Flash effect
      const flash = $('flash');
      flash.classList.remove('show');
      void flash.offsetWidth; // restart animation
      flash.classList.add('show');

      setTimeout(() => {
        capture().then(blob => {
          if (!blob) {
            showToast('撮影にしっぱいしました');
            if (wasSelected) wasSelected.classList.add('selected');
            return;
          }
          lastCapturedBlob = blob;
          const url = URL.createObjectURL(blob);
          $('preview-image').src = url;
          $('preview-screen').classList.add('open');
          tray.classList.remove('open');
          if (wasSelected) wasSelected.classList.add('selected');
        });
      }, 80);
    });

    async function capture() {
      const video = $('camera-view');
      if (!video.videoWidth) return null;

      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const sw = window.innerWidth;
      const sh = window.innerHeight;

      // Render at 2x for quality
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      const canvas = document.createElement('canvas');
      canvas.width = sw * dpr;
      canvas.height = sh * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      // Compute object-fit: cover source rect
      const videoRatio = vw / vh;
      const screenRatio = sw / sh;
      let sx, sy, sWidth, sHeight;
      if (videoRatio > screenRatio) {
        sHeight = vh;
        sWidth = vh * screenRatio;
        sx = (vw - sWidth) / 2;
        sy = 0;
      } else {
        sWidth = vw;
        sHeight = vw / screenRatio;
        sx = 0;
        sy = (vh - sHeight) / 2;
      }

      // Apply camera zoom by cropping further (centered)
      if (currentZoom > 1) {
        const zw = sWidth / currentZoom;
        const zh = sHeight / currentZoom;
        sx += (sWidth - zw) / 2;
        sy += (sHeight - zh) / 2;
        sWidth = zw;
        sHeight = zh;
      }

      // Draw video (mirrored if front camera)
      if (currentFacingMode === 'user') {
        ctx.save();
        ctx.translate(sw, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, sw, sh);
        ctx.restore();
      } else {
        ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, sw, sh);
      }

      // Draw stickers
      const stickers = document.querySelectorAll('.sticker');
      stickers.forEach(el => {
        const s = el._state;
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.rotate(s.rotation * Math.PI / 180);
        ctx.scale(s.scale, s.scale);
        // Drop shadow for parity with CSS
        ctx.shadowColor = 'rgba(0,0,0,0.4)';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetY = 4;

        if (s.src && imageCache.has(s.src)) {
          // PNG image sticker
          const img = imageCache.get(s.src);
          const size = 100; // matches .sticker-img CSS size
          ctx.drawImage(img, -size / 2, -size / 2, size, size);
        } else if (s.emoji) {
          // Emoji sticker
          ctx.font = '80px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(s.emoji, 0, 0);
        }
        ctx.restore();
      });

      return new Promise(resolve => {
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.92);
      });
    }

    /* ============================================
       Preview controls
       ============================================ */
    $('preview-close').addEventListener('click', () => {
      $('preview-screen').classList.remove('open');
    });

    $('retake-btn').addEventListener('click', () => {
      $('preview-screen').classList.remove('open');
    });

    function downloadPhoto() {
      const url = URL.createObjectURL(lastCapturedBlob);
      const a = document.createElement('a');
      a.href = url;
      const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
      a.download = `suma-seaworld-${ts}.jpg`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast('ほぞんしました！');
    }

    $('share-btn').addEventListener('click', async () => {
      if (!lastCapturedBlob) return;
      haptic();
      const file = new File([lastCapturedBlob], 'suma-seaworld.jpg', { type: 'image/jpeg' });
      try {
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            files: [file],
            title: '須磨シーワールド ARカメラ',
            text: '須磨シーワールドホテルでとった写真🐬'
          });
        } else {
          downloadPhoto();
        }
      } catch (e) {
        if (e.name !== 'AbortError') {
          console.error(e);
          showToast('シェアできませんでした');
        }
      }
    });

    /* ============================================
       Visibility / cleanup
       ============================================ */
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && stream) {
        // Pause video to save battery; will resume on visible
      }
    });

    // Prevent default gestures on the document
    document.addEventListener('gesturestart', (e) => e.preventDefault());
    document.addEventListener('gesturechange', (e) => e.preventDefault());

  </script>
</body>
</html>
